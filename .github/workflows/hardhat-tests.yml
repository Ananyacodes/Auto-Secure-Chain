name: Hardhat Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'hardhat.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - '.github/workflows/hardhat-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'hardhat.config.ts'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Compile contracts
      run: npm run compile
    
    - name: Run tests
      run: npm run test
    
    - name: Gas report (informational)
      continue-on-error: true
      run: npm run test 2>&1 | grep -A 20 "Gas Consumption:" || true
